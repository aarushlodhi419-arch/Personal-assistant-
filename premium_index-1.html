<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>StudyAI Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0b1020;--sidebar:#101828;--surface:#182234;--border:#2c3a56;
--text:#fff;--muted:#94a3b8;
--grad:linear-gradient(135deg,#8b5cf6,#3b82f6,#06b6d4);
}
body{
font-family:Inter,sans-serif;
background:radial-gradient(circle at top,#1b2250,#0b1020 40%,#080b14);
color:var(--text);
height:100vh;overflow:hidden;
}
.layout{display:flex;height:100vh}
.sidebar{
width:280px;background:rgba(16,24,40,.95);
border-right:1px solid var(--border);
display:flex;flex-direction:column;
}
.logo{display:flex;align-items:center;gap:10px;font-weight:700}
.logo-icon{
width:42px;height:42px;border-radius:12px;
background:var(--grad);display:flex;align-items:center;justify-content:center;
}
.sidebar-header,.sidebar-footer{padding:18px}
.new-chat,.send-btn{
background:var(--grad);border:none;color:white;cursor:pointer;
border-radius:12px;
}
.new-chat{width:100%;padding:12px;margin-top:15px}
.search-box{padding:14px}
.search-box input{
width:100%;padding:12px;border:none;border-radius:12px;
background:var(--surface);color:white;outline:none;
}
.chat-history{flex:1;overflow:auto;padding:10px}
.chat-item{
padding:12px;border-radius:12px;background:var(--surface);
margin-bottom:10px;cursor:pointer;
}
.logout-btn{
width:100%;padding:12px;border:none;border-radius:12px;
background:#1f2937;color:white;cursor:pointer;
}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{
height:70px;padding:0 24px;
display:flex;align-items:center;justify-content:space-between;
border-bottom:1px solid rgba(255,255,255,.06);
}
.model-select{
background:var(--surface);color:white;
border:1px solid var(--border);
padding:10px;border-radius:12px;
}
.chat{
flex:1;overflow:auto;padding:25px;
}
.welcome{text-align:center;padding-top:80px}
.welcome-icon{
width:90px;height:90px;margin:auto;margin-bottom:20px;
background:var(--grad);border-radius:24px;
display:flex;align-items:center;justify-content:center;font-size:38px;
}
.message{max-width:900px;margin:auto;padding:14px 0}
.user{text-align:right}
.user .bubble{
display:inline-block;background:#1e293b;padding:14px 18px;border-radius:18px;
/* FIX: wrap long text */
word-break:break-word;max-width:80%;text-align:left;
}
.ai{
background:rgba(255,255,255,.03);
padding:16px;border-radius:16px;
/* FIX: wrap long text */
word-break:break-word;
line-height:1.6;
}
/* FIX: style for loading indicator */
.ai.loading{
display:flex;align-items:center;gap:8px;color:var(--muted);font-style:italic;
}
.dot-anim span{
display:inline-block;animation:blink 1.2s infinite;
}
.dot-anim span:nth-child(2){animation-delay:.2s}
.dot-anim span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}

.input-area{padding:20px;border-top:1px solid rgba(255,255,255,.06)}
.input-wrapper{
max-width:900px;margin:auto;display:flex;gap:10px;
background:var(--surface);padding:12px;border-radius:18px;
}
textarea{
flex:1;background:none;border:none;outline:none;
color:white;resize:none;height:60px;font-family:inherit;font-size:14px;
}
.send-btn{width:50px;font-size:18px}
/* FIX: disabled state for send button */
.send-btn:disabled{opacity:0.4;cursor:not-allowed}

@media(max-width:768px){
.sidebar{display:none}
}
</style>
</head>
<body>

<div class="layout">

<aside class="sidebar">
<div class="sidebar-header">
<div class="logo">
<div class="logo-icon">⚡</div>
<div>StudyAI Pro</div>
</div>
<button class="new-chat" onclick="newChat()">+ New Chat</button>
</div>

<div class="search-box">
<input placeholder="Search chats">
</div>

<div class="chat-history" id="chatHistory">
<div class="chat-item">Welcome Chat</div>
</div>

<div class="sidebar-footer">
<button class="logout-btn" onclick="location.href='/logout'">Logout</button>
</div>
</aside>

<main class="main">

<div class="topbar">
<h3>StudyAI Pro</h3>
<select class="model-select" id="modelSelect">
<option value="auto">Auto Mode</option>
<option value="groq">Groq</option>
<option value="gemini">Gemini</option>
<option value="compare">Compare</option>
</select>
</div>

<div class="chat" id="chat">
<div class="welcome" id="welcome">
<div class="welcome-icon">⚡</div>
<h1>Welcome to StudyAI Pro</h1>
<p>Premium AI workspace powered by Groq and Gemini.</p>
</div>
</div>

<div class="input-area">
<div class="input-wrapper">
<textarea id="prompt" placeholder="Message StudyAI..."></textarea>
<button class="send-btn" id="sendBtn" onclick="sendMessage()">➜</button>
</div>
</div>

</main>
</div>

<script>
// FIX 1: history array is now properly maintained across messages
let history = [];
let isLoading = false;

const chatEl = document.getElementById("chat");
const promptEl = document.getElementById("prompt");
const sendBtn = document.getElementById("sendBtn");

// FIX 2: Enter key sends message (Shift+Enter = newline)
promptEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// FIX 3: Safe text rendering — escapes HTML to prevent XSS
function escapeHtml(text) {
  const div = document.createElement("div");
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

function removeWelcome() {
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();
}

function newChat() {
  // FIX 4: New chat properly resets history and chat area
  history = [];
  chatEl.innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⚡</div>
      <h1>Welcome to StudyAI Pro</h1>
      <p>Premium AI workspace powered by Groq and Gemini.</p>
    </div>`;
}

async function sendMessage() {
  // FIX 5: Prevent sending while a request is already in flight
  if (isLoading) return;

  const prompt = promptEl.value.trim();
  if (!prompt) return;

  removeWelcome();
  isLoading = true;
  sendBtn.disabled = true;

  // FIX 3: Use escapeHtml instead of raw innerHTML injection
  chatEl.innerHTML += `
    <div class="message user">
      <div class="bubble">${escapeHtml(prompt)}</div>
    </div>`;

  promptEl.value = "";

  // FIX 6: Show loading indicator while waiting for response
  const loadingId = "loading-" + Date.now();
  chatEl.innerHTML += `
    <div class="message" id="${loadingId}">
      <div class="ai loading">
        Thinking
        <span class="dot-anim"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>`;
  chatEl.scrollTop = chatEl.scrollHeight;

  try {
    const res = await fetch("/api/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      // FIX 1: Send current history so the API has conversation context
      body: JSON.stringify({ prompt, history })
    });

    const data = await res.json();

    // Remove loading indicator
    const loadingEl = document.getElementById(loadingId);
    if (loadingEl) loadingEl.remove();

    const answer = data.best || data.groq || data.error || "No response received.";

    // FIX 3: Use escapeHtml for AI response too
    chatEl.innerHTML += `
      <div class="message">
        <div class="ai">${escapeHtml(answer)}</div>
      </div>`;

    // FIX 1: Update history AFTER each exchange so next message has context
    history.push({ role: "user", content: prompt });
    history.push({ role: "assistant", content: answer });

    // Keep only last 20 messages (10 exchanges) to avoid overly long history
    if (history.length > 20) history = history.slice(-20);

  } catch (err) {
    const loadingEl = document.getElementById(loadingId);
    if (loadingEl) loadingEl.remove();

    // FIX 7: Show network/fetch errors to the user
    chatEl.innerHTML += `
      <div class="message">
        <div class="ai" style="color:#f87171;">
          Error: Could not reach the server. Please try again.
        </div>
      </div>`;
  } finally {
    // FIX 5: Always re-enable button after request completes or fails
    isLoading = false;
    sendBtn.disabled = false;
    chatEl.scrollTop = chatEl.scrollHeight;
    promptEl.focus();
  }
}
</script>

</body>
</html>
